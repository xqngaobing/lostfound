services:
  # 后端 API 服务
  - type: web
    name: zhenyuan-backend
    env: node
    buildCommand: |
      cd backend
      npm ci --only=production
      npm run prisma:generate
      npm run prisma:migrate
      npm run build
    startCommand: |
      cd backend
      npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: zhenyuan-db
          property: connectionString
      - key: ADMIN_TOKEN
        generateValue: true
      - key: ENC_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: PUBLIC_BASE_URL
        value: https://api.fanfanauto.top
      - key: CORS_ORIGIN
        value: https://fanfanauto.top
      - key: COOKIE_SECURE
        value: true
      - key: UPLOAD_DIR
        value: uploads
      - key: ITEM_EXPIRE_DAYS
        value: 30
    healthCheckPath: /api/health
    autoDeploy: true

  # 前端 Next.js 服务
  - type: web
    name: zhenyuan-frontend
    env: node
    buildCommand: |
      cd frontend
      npm ci
      npm run build
    startCommand: |
      cd frontend
      npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NEXT_PUBLIC_API_URL
        value: https://api.fanfanauto.top
    healthCheckPath: /
    autoDeploy: true
