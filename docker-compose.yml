version: "3.9"
services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zhenyuan_lostfound
    ports:
      - "5432:5432"
    volumes:
      - zhenyuan_pg:/var/lib/postgresql/data

volumes:
  zhenyuan_pg:
